- name: Aktualisiere Git-Repository auf entferntem Host
  hosts: "{{ target_server }}"
  gather_facts: no
  remote_user: "{{ target_user }}"
  tasks:
    - name: Aktualisiere das Git-Repository
      git:
        repo: "{{ full_bare_repo }}"
        dest: "{{ remote_dir }}"
        force: true
        update: yes
      delegate_to: localhost

- name: Create Tar-Archiv.
  hosts: "{{ target_server }}"
  gather_facts: no
  tasks:
    - name: Lösche das Archiv, wenn es existiert
      file:
        path: "{{ archive_dest }}"
        state: absent
      when: archive_dest is file

    - name: Führe das Tar-Archivierungs-Kommando aus
      ansible.builtin.shell:
        cmd: |
          current_folder=$(basename "$PWD")
          tar_file="{{ archive_dest }}"
          excludes="{{ archive_excludes }}"
          cmd_exclude=""

          for exclude in $excludes; do
            cmd_exclude="$cmd_exclude --exclude=$exclude"
          done

          tar -czvf "$tar_file" $cmd_exclude -C .. "$current_folder"
        chdir: "{{ remote_dir }}"

    - name: Calc SHA-256-Hash
      ansible.builtin.shell: "sha256sum {{ archive_dest }} | cut -d ' ' -f 1 > {{ archive_dest }}.sha256"
      args:
        executable: /bin/bash
      register: sha256_result

    - name: Eigetümer Ändern
      ansible.builtin.file:
        path: "{{ item }}"
        owner: "{{ archive_owner }}"
        group: "{{ archive_group }}"
      with_items:
        - "{{ archive_dest }}"
        - "{{ archive_dest }}.sha256"
  